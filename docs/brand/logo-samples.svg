<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2600" viewBox="0 0 1600 2600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffcf7"/>
      <stop offset="0.52" stop-color="#f1faf5"/>
      <stop offset="1" stop-color="#eef5fb"/>
    </linearGradient>
    <linearGradient id="deep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#123540"/>
      <stop offset="0.55" stop-color="#15233c"/>
      <stop offset="1" stop-color="#35283a"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffcf8"/>
      <stop offset="0.55" stop-color="#e8f7f1"/>
      <stop offset="1" stop-color="#fff0e4"/>
    </linearGradient>
    <linearGradient id="active" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e04f42"/>
      <stop offset="0.55" stop-color="#287e72"/>
      <stop offset="1" stop-color="#e7b75f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#10141f" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 900 48px Arial, sans-serif; fill: #10141f; }
      .sub { font: 500 22px Arial, sans-serif; fill: #687180; }
      .tileTitle { font: 900 30px Arial, sans-serif; fill: #10141f; }
      .tileSub { font: 500 17px Arial, sans-serif; fill: #687180; }
      .word { font: 900 36px Arial, sans-serif; fill: #10141f; }
      .wordLight { font: 900 36px Arial, sans-serif; fill: #fffcf8; }
      .num { font: 900 20px Arial, sans-serif; fill: #e04f42; }
      .chip { font: 800 13px Arial, sans-serif; fill: #687180; }
    </style>
  </defs>

  <rect width="1600" height="2600" fill="url(#bg)"/>
  <text x="60" y="82" class="title">Smart Trainner Brand Direction Samples</text>
  <text x="60" y="122" class="sub">10 logo and tone options. Built as vector-friendly geometry for Android Canvas or SVG resources.</text>

  <!-- 1 -->
  <g transform="translate(60 170)" filter="url(#shadow)">
    <rect width="700" height="430" rx="28" fill="#fffcf8" stroke="#e1dad0" stroke-width="2"/>
    <text x="32" y="52" class="num">01</text>
    <text x="72" y="52" class="tileTitle">Momentum Bars</text>
    <text x="32" y="84" class="tileSub">Closest to current mark, polished for launch.</text>
    <g transform="translate(44 132)">
      <rect width="144" height="144" rx="28" fill="#10141f"/>
      <rect x="100" y="20" width="30" height="104" rx="12" fill="#202838"/>
      <rect x="24" y="32" width="72" height="14" rx="7" fill="#e04f42"/>
      <rect x="24" y="92" width="72" height="14" rx="7" fill="#e04f42"/>
      <rect x="100" y="32" width="18" height="74" rx="9" fill="#287e72"/>
      <circle cx="42" cy="72" r="10" fill="#e7b75f"/>
      <rect x="50" y="64" width="74" height="16" rx="8" fill="#fffcf8"/>
      <rect x="78" y="64" width="16" height="44" rx="8" fill="#fffcf8"/>
    </g>
    <text x="228" y="186" class="word">Smart Trainner</text>
    <text x="228" y="226" class="tileSub">Calm pro fitness, balanced and familiar.</text>
    <rect x="228" y="258" width="72" height="16" rx="8" fill="#e04f42"/>
    <rect x="314" y="258" width="72" height="16" rx="8" fill="#287e72"/>
    <rect x="400" y="258" width="72" height="16" rx="8" fill="#e7b75f"/>
    <text x="32" y="378" class="chip">Best if we want brand continuity with the current implementation.</text>
  </g>

  <!-- 2 -->
  <g transform="translate(840 170)" filter="url(#shadow)">
    <rect width="700" height="430" rx="28" fill="#ffffff" stroke="#e1dad0" stroke-width="2"/>
    <text x="32" y="52" class="num">02</text>
    <text x="72" y="52" class="tileTitle">Pulse Plate</text>
    <text x="32" y="84" class="tileSub">Workout logging meets measurable progress.</text>
    <g transform="translate(44 132)">
      <rect width="144" height="144" rx="28" fill="url(#warm)"/>
      <rect x="22" y="69" width="100" height="16" rx="8" fill="#10141f"/>
      <rect x="14" y="56" width="16" height="42" rx="8" fill="#e04f42"/>
      <rect x="114" y="50" width="16" height="54" rx="8" fill="#287e72"/>
      <path d="M34 66 L50 66 L60 44 L76 100 L88 66 L106 66" fill="none" stroke="#e7b75f" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="228" y="186" class="word">Smart Trainner</text>
    <text x="228" y="226" class="tileSub">More data-centric, good for future AI analysis.</text>
    <rect x="228" y="258" width="158" height="16" rx="8" fill="url(#active)"/>
    <text x="32" y="378" class="chip">Feels modern and app-like without going too sporty.</text>
  </g>

  <!-- 3 -->
  <g transform="translate(60 640)" filter="url(#shadow)">
    <rect width="700" height="430" rx="28" fill="#ffffff" stroke="#e1dad0" stroke-width="2"/>
    <text x="32" y="52" class="num">03</text>
    <text x="72" y="52" class="tileTitle">Lift Track</text>
    <text x="32" y="84" class="tileSub">Plan lanes plus one bold training T.</text>
    <g transform="translate(44 132)">
      <rect width="144" height="144" rx="28" fill="#123540"/>
      <rect x="28" y="34" width="88" height="14" rx="7" fill="#e04f42"/>
      <rect x="28" y="66" width="88" height="14" rx="7" fill="#287e72"/>
      <rect x="28" y="98" width="88" height="14" rx="7" fill="#e7b75f"/>
      <rect x="56" y="42" width="32" height="78" rx="12" fill="#fffcf8"/>
      <rect x="38" y="64" width="68" height="16" rx="8" fill="#fffcf8"/>
    </g>
    <text x="228" y="186" class="word">Smart Trainner</text>
    <text x="228" y="226" class="tileSub">Structured, clear, and strong at launcher size.</text>
    <rect x="228" y="258" width="72" height="16" rx="8" fill="#123540"/>
    <rect x="314" y="258" width="72" height="16" rx="8" fill="#e04f42"/>
    <rect x="400" y="258" width="72" height="16" rx="8" fill="#e7b75f"/>
    <text x="32" y="378" class="chip">Best readability among simple geometric marks.</text>
  </g>

  <!-- 4 -->
  <g transform="translate(840 640)" filter="url(#shadow)">
    <rect width="700" height="430" rx="28" fill="#10141f" stroke="#202838" stroke-width="2"/>
    <text x="32" y="52" class="num">04</text>
    <text x="72" y="52" class="tileTitle" fill="#fffcf8">Gradient Monogram</text>
    <text x="32" y="84" class="tileSub" fill="#d5dce2">A premium ST monogram with more energy.</text>
    <g transform="translate(44 132)">
      <rect width="144" height="144" rx="32" fill="url(#deep)"/>
      <path d="M92 34 C58 24 38 40 38 61 C38 89 96 73 96 102 C96 121 62 124 38 111" fill="none" stroke="#fffcf8" stroke-width="16" stroke-linecap="round"/>
      <path d="M44 44 H108 M76 44 V116" fill="none" stroke="url(#active)" stroke-width="12" stroke-linecap="round"/>
    </g>
    <text x="228" y="186" class="wordLight">Smart Trainner</text>
    <text x="228" y="226" class="tileSub" fill="#d5dce2">More premium, slightly tech-forward.</text>
    <rect x="228" y="258" width="160" height="16" rx="8" fill="url(#active)"/>
    <text x="32" y="378" class="chip" fill="#d5dce2">Strong for splash, but may be too abstract for beginners.</text>
  </g>

  <!-- 5 -->
  <g transform="translate(60 1110)" filter="url(#shadow)">
    <rect width="700" height="430" rx="28" fill="#ffffff" stroke="#e1dad0" stroke-width="2"/>
    <text x="32" y="52" class="num">05</text>
    <text x="72" y="52" class="tileTitle">Coach Compass</text>
    <text x="32" y="84" class="tileSub">A trainer-like direction mark for planning.</text>
    <g transform="translate(44 132)">
      <rect width="144" height="144" rx="28" fill="url(#warm)"/>
      <circle cx="72" cy="72" r="46" fill="none" stroke="#10141f" stroke-width="12"/>
      <circle cx="72" cy="72" r="18" fill="#287e72"/>
      <path d="M74 72 L104 38 L92 90 Z" fill="#e04f42"/>
      <path d="M70 74 L40 106 L52 54 Z" fill="#e7b75f"/>
    </g>
    <text x="228" y="186" class="word">Smart Trainner</text>
    <text x="228" y="226" class="tileSub">Friendly guidance, less gym-equipment literal.</text>
    <rect x="228" y="258" width="72" height="16" rx="8" fill="#10141f"/>
    <rect x="314" y="258" width="72" height="16" rx="8" fill="#287e72"/>
    <rect x="400" y="258" width="72" height="16" rx="8" fill="#e7b75f"/>
    <text x="32" y="378" class="chip">Good if product should feel like a coach, not just a logbook.</text>
  </g>

  <!-- 6 -->
  <g transform="translate(840 1110)" filter="url(#shadow)">
    <rect width="700" height="430" rx="28" fill="#fffcf8" stroke="#e1dad0" stroke-width="2"/>
    <text x="32" y="52" class="num">06</text>
    <text x="72" y="52" class="tileTitle">Set Stack</text>
    <text x="32" y="84" class="tileSub">Designed around set-by-set recording.</text>
    <g transform="translate(44 132)">
      <rect width="144" height="144" rx="28" fill="#10141f"/>
      <rect x="28" y="30" width="88" height="28" rx="10" fill="#fffcf8"/>
      <rect x="28" y="62" width="88" height="28" rx="10" fill="#287e72"/>
      <rect x="28" y="94" width="88" height="28" rx="10" fill="#e04f42"/>
      <rect x="64" y="26" width="18" height="102" rx="9" fill="#e7b75f"/>
    </g>
    <text x="228" y="186" class="word">Smart Trainner</text>
    <text x="228" y="226" class="tileSub">Very MVP-aligned with logs, sets, and progress.</text>
    <rect x="228" y="258" width="72" height="16" rx="8" fill="#10141f"/>
    <rect x="314" y="258" width="72" height="16" rx="8" fill="#fffcf8" stroke="#e1dad0"/>
    <rect x="400" y="258" width="72" height="16" rx="8" fill="#e04f42"/>
    <text x="32" y="378" class="chip">Clear concept, but a little more utilitarian.</text>
  </g>

  <!-- 7 -->
  <g transform="translate(60 1580)" filter="url(#shadow)">
    <rect width="700" height="430" rx="28" fill="#ffffff" stroke="#e1dad0" stroke-width="2"/>
    <text x="32" y="52" class="num">07</text>
    <text x="72" y="52" class="tileTitle">Motion Badge</text>
    <text x="32" y="84" class="tileSub">Dynamic but still restrained.</text>
    <g transform="translate(44 132)">
      <rect width="144" height="144" rx="28" fill="url(#deep)"/>
      <path d="M26 98 L68 38 H96 L54 98 Z" fill="#e04f42"/>
      <path d="M54 108 L96 48 H118 L76 108 Z" fill="#287e72"/>
      <path d="M34 112 H104" stroke="#e7b75f" stroke-width="12" stroke-linecap="round"/>
      <path d="M62 44 H118" stroke="#fffcf8" stroke-width="12" stroke-linecap="round"/>
    </g>
    <text x="228" y="186" class="word">Smart Trainner</text>
    <text x="228" y="226" class="tileSub">Sporty momentum for workouts and streaks.</text>
    <rect x="228" y="258" width="72" height="16" rx="8" fill="#e04f42"/>
    <rect x="314" y="258" width="72" height="16" rx="8" fill="#287e72"/>
    <rect x="400" y="258" width="72" height="16" rx="8" fill="#15233c"/>
    <text x="32" y="378" class="chip">Good energy, risk: less obvious as fitness app at tiny size.</text>
  </g>

  <!-- 8 -->
  <g transform="translate(840 1580)" filter="url(#shadow)">
    <rect width="700" height="430" rx="28" fill="#ffffff" stroke="#e1dad0" stroke-width="2"/>
    <text x="32" y="52" class="num">08</text>
    <text x="72" y="52" class="tileTitle">Studio Crest</text>
    <text x="32" y="84" class="tileSub">A refined training studio identity.</text>
    <g transform="translate(44 132)">
      <rect width="144" height="144" rx="34" fill="#fffcf8" stroke="#10141f" stroke-width="10"/>
      <path d="M34 52 H110 M44 92 H100" stroke="#10141f" stroke-width="14" stroke-linecap="round"/>
      <path d="M52 52 V92 M92 52 V92" stroke="#e04f42" stroke-width="12" stroke-linecap="round"/>
      <circle cx="34" cy="52" r="10" fill="#287e72"/>
      <circle cx="110" cy="52" r="10" fill="#e7b75f"/>
    </g>
    <text x="228" y="186" class="word">Smart Trainner</text>
    <text x="228" y="226" class="tileSub">Quiet, premium, and less tech-heavy.</text>
    <rect x="228" y="258" width="72" height="16" rx="8" fill="#fffcf8" stroke="#e1dad0"/>
    <rect x="314" y="258" width="72" height="16" rx="8" fill="#10141f"/>
    <rect x="400" y="258" width="72" height="16" rx="8" fill="#287e72"/>
    <text x="32" y="378" class="chip">Best if the app should feel elegant and trustworthy.</text>
  </g>

  <!-- 9 -->
  <g transform="translate(60 2050)" filter="url(#shadow)">
    <rect width="700" height="430" rx="28" fill="#10141f" stroke="#202838" stroke-width="2"/>
    <text x="32" y="52" class="num">09</text>
    <text x="72" y="52" class="tileTitle" fill="#fffcf8">Neural Coach</text>
    <text x="32" y="84" class="tileSub" fill="#d5dce2">Subtle AI-ready direction for the roadmap.</text>
    <g transform="translate(44 132)">
      <rect width="144" height="144" rx="28" fill="url(#deep)"/>
      <path d="M34 96 C54 38 92 38 112 96" fill="none" stroke="#fffcf8" stroke-width="10" stroke-linecap="round"/>
      <path d="M42 72 H102" stroke="#287e72" stroke-width="10" stroke-linecap="round"/>
      <circle cx="34" cy="96" r="11" fill="#e04f42"/>
      <circle cx="72" cy="46" r="11" fill="#e7b75f"/>
      <circle cx="112" cy="96" r="11" fill="#287e72"/>
      <rect x="64" y="66" width="16" height="48" rx="8" fill="#fffcf8"/>
    </g>
    <text x="228" y="186" class="wordLight">Smart Trainner</text>
    <text x="228" y="226" class="tileSub" fill="#d5dce2">Future-facing without using generic sparkle AI visuals.</text>
    <rect x="228" y="258" width="160" height="16" rx="8" fill="url(#active)"/>
    <text x="32" y="378" class="chip" fill="#d5dce2">Best for AI analysis roadmap; may feel less gym-native today.</text>
  </g>

  <!-- 10 -->
  <g transform="translate(840 2050)" filter="url(#shadow)">
    <rect width="700" height="430" rx="28" fill="url(#warm)" stroke="#e1dad0" stroke-width="2"/>
    <text x="32" y="52" class="num">10</text>
    <text x="72" y="52" class="tileTitle">Arena Wordmark</text>
    <text x="32" y="84" class="tileSub">Wordmark-led identity with a compact app icon.</text>
    <g transform="translate(44 132)">
      <rect width="144" height="144" rx="28" fill="#10141f"/>
      <text x="30" y="95" font-family="Arial, sans-serif" font-size="70" font-weight="900" fill="#fffcf8">ST</text>
      <rect x="24" y="30" width="94" height="10" rx="5" fill="#e04f42"/>
      <rect x="24" y="108" width="94" height="10" rx="5" fill="#287e72"/>
      <circle cx="124" cy="74" r="9" fill="#e7b75f"/>
    </g>
    <text x="228" y="186" font-family="Arial, sans-serif" font-size="42" font-weight="900" fill="#10141f">SMART TRAINNER</text>
    <text x="228" y="226" class="tileSub">Bold and direct. Strong title lockup for splash.</text>
    <rect x="228" y="258" width="72" height="16" rx="8" fill="#10141f"/>
    <rect x="314" y="258" width="72" height="16" rx="8" fill="#e04f42"/>
    <rect x="400" y="258" width="72" height="16" rx="8" fill="#287e72"/>
    <text x="32" y="378" class="chip">Most direct choice, but less distinctive than symbolic options.</text>
  </g>
</svg>
