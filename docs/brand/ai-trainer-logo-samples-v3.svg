<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="2500" viewBox="0 0 1800 2500">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffcf7"/>
      <stop offset="0.5" stop-color="#f2fbf6"/>
      <stop offset="1" stop-color="#eef6fb"/>
    </linearGradient>
    <linearGradient id="soft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.52" stop-color="#f1faf5"/>
      <stop offset="1" stop-color="#fff0e7"/>
    </linearGradient>
    <linearGradient id="deep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#123540"/>
      <stop offset="0.56" stop-color="#15233c"/>
      <stop offset="1" stop-color="#35283a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#10141f" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 900 56px Arial, sans-serif; fill: #10141f; }
      .sub { font: 600 25px Arial, sans-serif; fill: #687180; }
      .no { font: 900 26px Arial, sans-serif; fill: #e04f42; }
      .name { font: 900 34px Arial, sans-serif; fill: #10141f; }
      .nameLight { font: 900 34px Arial, sans-serif; fill: #fffcf8; }
      .desc { font: 600 20px Arial, sans-serif; fill: #687180; }
      .descLight { font: 600 20px Arial, sans-serif; fill: #d5dce2; }
      .brand { font: 900 42px Arial, sans-serif; fill: #10141f; }
      .brandLight { font: 900 42px Arial, sans-serif; fill: #fffcf8; }
    </style>
  </defs>

  <rect width="1800" height="2500" fill="url(#page)"/>
  <text x="70" y="92" class="title">AI Trainer Logo Samples</text>
  <text x="70" y="138" class="sub">복잡한 기능 상징 대신, 심플한 AI 트레이너 형상으로 다시 잡은 방향입니다.</text>

  <!-- 01 -->
  <g transform="translate(70 205)" filter="url(#shadow)">
    <rect width="790" height="480" rx="32" fill="#ffffff" stroke="#e1dad0" stroke-width="2"/>
    <text x="36" y="58" class="no">01</text>
    <text x="86" y="58" class="name">Coach Head</text>
    <text x="36" y="96" class="desc">AI 트레이너 얼굴을 가장 단순하게 표현.</text>
    <g transform="translate(66 138)">
      <rect width="180" height="180" rx="44" fill="#10141f"/>
      <circle cx="90" cy="70" r="42" fill="#fffcf8"/>
      <path d="M46 138 C57 104 123 104 134 138" fill="none" stroke="#fffcf8" stroke-width="20" stroke-linecap="round"/>
      <circle cx="74" cy="68" r="7" fill="#287e72"/>
      <circle cx="106" cy="68" r="7" fill="#287e72"/>
      <path d="M71 91 C81 101 99 101 109 91" fill="none" stroke="#e04f42" stroke-width="8" stroke-linecap="round"/>
      <path d="M132 68 H154" stroke="#e7b75f" stroke-width="9" stroke-linecap="round"/>
      <circle cx="158" cy="68" r="8" fill="#e7b75f"/>
    </g>
    <text x="300" y="215" class="brand">Smart Trainner</text>
    <text x="300" y="264" class="desc">가장 친근하고 바로 이해되는 방향.</text>
  </g>

  <!-- 02 -->
  <g transform="translate(940 205)" filter="url(#shadow)">
    <rect width="790" height="480" rx="32" fill="url(#soft)" stroke="#e1dad0" stroke-width="2"/>
    <text x="36" y="58" class="no">02</text>
    <text x="86" y="58" class="name">Trainer Bust</text>
    <text x="36" y="96" class="desc">사람 트레이너 실루엣에 AI 포인트만 작게.</text>
    <g transform="translate(66 138)">
      <rect width="180" height="180" rx="44" fill="#123540"/>
      <circle cx="90" cy="58" r="34" fill="#fffcf8"/>
      <path d="M36 145 C46 96 134 96 144 145" fill="#fffcf8"/>
      <path d="M58 122 H122" stroke="#287e72" stroke-width="16" stroke-linecap="round"/>
      <circle cx="50" cy="122" r="13" fill="#e04f42"/>
      <circle cx="130" cy="122" r="13" fill="#287e72"/>
      <path d="M90 24 V10" stroke="#e7b75f" stroke-width="8" stroke-linecap="round"/>
      <circle cx="90" cy="8" r="8" fill="#e7b75f"/>
    </g>
    <text x="300" y="215" class="brand">Smart Trainner</text>
    <text x="300" y="264" class="desc">AI 느낌과 사람 느낌의 균형이 좋음.</text>
  </g>

  <!-- 03 -->
  <g transform="translate(70 745)" filter="url(#shadow)">
    <rect width="790" height="480" rx="32" fill="#10141f" stroke="#202838" stroke-width="2"/>
    <text x="36" y="58" class="no">03</text>
    <text x="86" y="58" class="nameLight">Spotter AI</text>
    <text x="36" y="96" class="descLight">바벨을 잡아주는 AI 트레이너.</text>
    <g transform="translate(66 138)">
      <rect width="180" height="180" rx="44" fill="url(#deep)"/>
      <circle cx="90" cy="57" r="28" fill="#fffcf8"/>
      <path d="M58 146 C62 102 118 102 122 146" fill="none" stroke="#fffcf8" stroke-width="18" stroke-linecap="round"/>
      <path d="M42 96 H138" stroke="#e7b75f" stroke-width="13" stroke-linecap="round"/>
      <rect x="26" y="82" width="22" height="28" rx="10" fill="#e04f42"/>
      <rect x="132" y="82" width="22" height="28" rx="10" fill="#287e72"/>
      <path d="M56 103 L76 82 M124 103 L104 82" stroke="#fffcf8" stroke-width="9" stroke-linecap="round"/>
    </g>
    <text x="300" y="215" class="brandLight">Smart Trainner</text>
    <text x="300" y="264" class="descLight">헬스 트레이너 맥락이 가장 강함.</text>
  </g>

  <!-- 04 -->
  <g transform="translate(940 745)" filter="url(#shadow)">
    <rect width="790" height="480" rx="32" fill="#ffffff" stroke="#e1dad0" stroke-width="2"/>
    <text x="36" y="58" class="no">04</text>
    <text x="86" y="58" class="name">Friendly Bot Coach</text>
    <text x="36" y="96" class="desc">너무 로봇 같지 않은 AI 코치 캐릭터.</text>
    <g transform="translate(66 138)">
      <rect width="180" height="180" rx="44" fill="#fffcf8" stroke="#10141f" stroke-width="10"/>
      <rect x="50" y="43" width="80" height="62" rx="22" fill="#10141f"/>
      <circle cx="74" cy="72" r="7" fill="#e7b75f"/>
      <circle cx="106" cy="72" r="7" fill="#e7b75f"/>
      <path d="M74 91 C82 98 98 98 106 91" fill="none" stroke="#fffcf8" stroke-width="6" stroke-linecap="round"/>
      <path d="M44 138 C52 112 128 112 136 138" fill="none" stroke="#287e72" stroke-width="18" stroke-linecap="round"/>
      <path d="M90 42 V24" stroke="#e04f42" stroke-width="8" stroke-linecap="round"/>
      <circle cx="90" cy="22" r="8" fill="#e04f42"/>
    </g>
    <text x="300" y="215" class="brand">Smart Trainner</text>
    <text x="300" y="264" class="desc">친근함이 제일 강하지만, 조금 캐릭터 앱 느낌.</text>
  </g>

  <!-- 05 -->
  <g transform="translate(70 1285)" filter="url(#shadow)">
    <rect width="790" height="480" rx="32" fill="url(#soft)" stroke="#e1dad0" stroke-width="2"/>
    <text x="36" y="58" class="no">05</text>
    <text x="86" y="58" class="name">Minimal Trainer T</text>
    <text x="36" y="96" class="desc">트레이너 몸통과 앱 이니셜 T를 합친 심플 마크.</text>
    <g transform="translate(66 138)">
      <rect width="180" height="180" rx="44" fill="#10141f"/>
      <circle cx="90" cy="50" r="26" fill="#fffcf8"/>
      <rect x="54" y="86" width="72" height="19" rx="9" fill="#fffcf8"/>
      <rect x="80" y="86" width="20" height="62" rx="10" fill="#fffcf8"/>
      <path d="M42 86 H64" stroke="#e04f42" stroke-width="15" stroke-linecap="round"/>
      <path d="M116 86 H138" stroke="#287e72" stroke-width="15" stroke-linecap="round"/>
      <circle cx="90" cy="24" r="7" fill="#e7b75f"/>
    </g>
    <text x="300" y="215" class="brand">Smart Trainner</text>
    <text x="300" y="264" class="desc">앱 아이콘으로 가장 깔끔하고 오래감.</text>
  </g>

  <!-- 06 -->
  <g transform="translate(940 1285)" filter="url(#shadow)">
    <rect width="790" height="480" rx="32" fill="#ffffff" stroke="#e1dad0" stroke-width="2"/>
    <text x="36" y="58" class="no">06</text>
    <text x="86" y="58" class="name">Coach Shield</text>
    <text x="36" y="96" class="desc">안전하게 운동을 이끄는 트레이너.</text>
    <g transform="translate(66 138)">
      <rect width="180" height="180" rx="44" fill="#fffcf8"/>
      <path d="M90 25 L140 44 V82 C140 118 117 142 90 154 C63 142 40 118 40 82 V44 Z" fill="#10141f"/>
      <circle cx="90" cy="62" r="22" fill="#fffcf8"/>
      <path d="M57 126 C64 100 116 100 123 126" fill="none" stroke="#fffcf8" stroke-width="14" stroke-linecap="round"/>
      <path d="M58 85 H122" stroke="#287e72" stroke-width="10" stroke-linecap="round"/>
      <circle cx="58" cy="85" r="9" fill="#e04f42"/>
      <circle cx="122" cy="85" r="9" fill="#287e72"/>
      <circle cx="90" cy="32" r="7" fill="#e7b75f"/>
    </g>
    <text x="300" y="215" class="brand">Smart Trainner</text>
    <text x="300" y="264" class="desc">초보자 안전/신뢰 메시지가 강함.</text>
  </g>

  <!-- 07 -->
  <g transform="translate(70 1825)" filter="url(#shadow)">
    <rect width="790" height="480" rx="32" fill="#ffffff" stroke="#e1dad0" stroke-width="2"/>
    <text x="36" y="58" class="no">07</text>
    <text x="86" y="58" class="name">Trainer Mascot</text>
    <text x="36" y="96" class="desc">앞으로 애니 트레이너 캐릭터와도 연결되는 얼굴형.</text>
    <g transform="translate(66 138)">
      <rect width="180" height="180" rx="44" fill="#10141f"/>
      <circle cx="90" cy="68" r="40" fill="#fffcf8"/>
      <path d="M55 54 C70 26 111 27 127 54 C108 45 80 45 55 54Z" fill="#202838"/>
      <circle cx="77" cy="70" r="6" fill="#10141f"/>
      <circle cx="103" cy="70" r="6" fill="#10141f"/>
      <path d="M78 92 C85 98 96 98 103 92" fill="none" stroke="#e04f42" stroke-width="6" stroke-linecap="round"/>
      <path d="M48 142 C57 110 123 110 132 142" fill="none" stroke="#287e72" stroke-width="18" stroke-linecap="round"/>
      <path d="M134 70 H154" stroke="#e7b75f" stroke-width="7" stroke-linecap="round"/>
    </g>
    <text x="300" y="215" class="brand">Smart Trainner</text>
    <text x="300" y="264" class="desc">가장 캐릭터성이 좋음. 로고보다 마스코트 느낌.</text>
  </g>

  <!-- 08 -->
  <g transform="translate(940 1825)" filter="url(#shadow)">
    <rect width="790" height="480" rx="32" fill="url(#soft)" stroke="#e1dad0" stroke-width="2"/>
    <text x="36" y="58" class="no">08</text>
    <text x="86" y="58" class="name">AI Trainer Mark</text>
    <text x="36" y="96" class="desc">사람, AI 노드, 바벨을 가장 단순한 비율로 결합.</text>
    <g transform="translate(66 138)">
      <rect width="180" height="180" rx="44" fill="#10141f"/>
      <circle cx="90" cy="52" r="27" fill="#fffcf8"/>
      <path d="M50 140 C58 100 122 100 130 140" fill="none" stroke="#fffcf8" stroke-width="18" stroke-linecap="round"/>
      <path d="M48 96 H132" stroke="#287e72" stroke-width="13" stroke-linecap="round"/>
      <circle cx="48" cy="96" r="12" fill="#e04f42"/>
      <circle cx="132" cy="96" r="12" fill="#287e72"/>
      <path d="M90 25 V8 M90 8 H112" stroke="#e7b75f" stroke-width="7" stroke-linecap="round"/>
      <circle cx="116" cy="8" r="7" fill="#e7b75f"/>
    </g>
    <text x="300" y="215" class="brand">Smart Trainner</text>
    <text x="300" y="264" class="desc">내 추천. 단순하고 AI 트레이너로 바로 읽힘.</text>
  </g>
</svg>
