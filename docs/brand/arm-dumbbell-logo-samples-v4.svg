    <text x="305" y="275" class="descLight">강한 인상. 다크 테마 면적은 앱 안에서 제한적으로 쓰는 게 좋음.</text>
  </g>

  <!-- 04 -->
  <g transform="translate(940 765)" filter="url(#shadow)">
    <rect width="790" height="500" rx="32" fill="#ffffff" stroke="#e1dad0" stroke-width="2"/>
    <text x="36" y="58" class="no">04</text>
    <text x="86" y="58" class="title">Shield Lift</text>
    <text x="36" y="96" class="desc">안전한 트레이닝/신뢰감을 더한 실드형.</text>
    <g transform="translate(62 145)">
      <rect width="188" height="188" rx="42" fill="#fffcf8"/>
      <path d="M94 17 L150 38 V86 C150 128 124 158 94 172 C64 158 38 128 38 86 V38Z" fill="#10141f"/>
      <rect x="51" y="39" width="86" height="14" rx="7" fill="#fffcf8"/>
      <rect x="35" y="31" width="20" height="30" rx="8" fill="#e04f42"/>
      <rect x="133" y="31" width="20" height="30" rx="8" fill="#287e72"/>
      <path d="M94 51 C113 70 115 99 104 121" fill="none" stroke="#fffcf8" stroke-width="18" stroke-linecap="round"/>
      <path d="M103 120 C90 150 59 148 49 128" fill="none" stroke="#fffcf8" stroke-width="22" stroke-linecap="round"/>
