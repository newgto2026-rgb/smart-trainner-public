<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="3100" viewBox="0 0 1800 3100">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffcf7"/>
      <stop offset="0.52" stop-color="#f3fbf6"/>
      <stop offset="1" stop-color="#eef6fb"/>
    </linearGradient>
    <linearGradient id="deep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102f3a"/>
      <stop offset="0.55" stop-color="#131d32"/>
      <stop offset="1" stop-color="#30243a"/>
    </linearGradient>
    <linearGradient id="fire" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f05a44"/>
      <stop offset="0.55" stop-color="#dc3f37"/>
      <stop offset="1" stop-color="#b92f4a"/>
    </linearGradient>
    <linearGradient id="tealFire" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e04f42"/>
      <stop offset="0.48" stop-color="#287e72"/>
      <stop offset="1" stop-color="#e7b75f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#10141f" flood-opacity="0.13"/>
    </filter>
    <style>
      .pageTitle { font: 900 58px Arial, sans-serif; fill: #10141f; }
      .pageSub { font: 600 25px Arial, sans-serif; fill: #687180; }
      .no { font: 900 26px Arial, sans-serif; fill: #e04f42; }
      .title { font: 900 34px Arial, sans-serif; fill: #10141f; }
      .titleLight { font: 900 34px Arial, sans-serif; fill: #fffcf8; }
      .desc { font: 600 20px Arial, sans-serif; fill: #687180; }
      .descLight { font: 600 20px Arial, sans-serif; fill: #d5dce2; }
      .brand { font: 900 43px Arial, sans-serif; fill: #10141f; }
      .brandLight { font: 900 43px Arial, sans-serif; fill: #fffcf8; }
    </style>
  </defs>

  <rect width="1800" height="3100" fill="url(#page)"/>
  <text x="70" y="94" class="pageTitle">Arm + Dumbbell Logo Samples</text>
  <text x="70" y="140" class="pageSub">근육질 팔이 아령을 높이 드는 방향. 장난감 느낌을 줄이고 헬스 앱다운 힘과 신뢰감을 우선했습니다.</text>

  <!-- shared icon recipe: dumbbell overhead + flexed arm silhouette -->

  <!-- 01 -->
  <g transform="translate(70 205)" filter="url(#shadow)">
    <rect width="790" height="500" rx="32" fill="#ffffff" stroke="#e1dad0" stroke-width="2"/>
    <text x="36" y="58" class="no">01</text>
    <text x="86" y="58" class="title">Classic Power Arm</text>
    <text x="36" y="96" class="desc">가장 직관적인 헬스 앱 아이콘. 팔과 아령이 바로 읽힘.</text>
    <g transform="translate(62 145)">
      <rect width="188" height="188" rx="42" fill="#10141f"/>
      <rect x="47" y="27" width="94" height="16" rx="8" fill="#fffcf8"/>
      <rect x="29" y="18" width="22" height="34" rx="9" fill="#e04f42"/>
      <rect x="137" y="18" width="22" height="34" rx="9" fill="#287e72"/>
      <rect x="82" y="42" width="26" height="20" rx="9" fill="#fffcf8"/>
      <path d="M96 57 C120 74 124 105 108 131 C94 126 84 111 84 96 C84 78 88 65 96 57Z" fill="#e04f42"/>
      <path d="M110 128 C99 163 56 166 36 136 C54 133 70 121 80 101 C90 109 101 119 110 128Z" fill="#e04f42"/>
      <circle cx="53" cy="136" r="20" fill="#e04f42"/>
      <path d="M94 72 C104 84 106 100 99 114" fill="none" stroke="#ffb1a5" stroke-width="7" stroke-linecap="round"/>
    </g>
    <text x="305" y="225" class="brand">Smart Trainner</text>
    <text x="305" y="275" class="desc">추천 후보. 제일 단순하고 앱 아이콘으로 강함.</text>
  </g>

  <!-- 02 -->
  <g transform="translate(940 205)" filter="url(#shadow)">
    <rect width="790" height="500" rx="32" fill="#ffffff" stroke="#e1dad0" stroke-width="2"/>
    <text x="36" y="58" class="no">02</text>
    <text x="86" y="58" class="title">Premium Line Arm</text>
    <text x="36" y="96" class="desc">더 성숙한 라인형. 피트니스 스튜디오 브랜드 느낌.</text>
    <g transform="translate(62 145)">
      <rect width="188" height="188" rx="42" fill="#fffcf8" stroke="#10141f" stroke-width="10"/>
      <path d="M41 35 H147" stroke="#10141f" stroke-width="16" stroke-linecap="round"/>
      <path d="M27 25 V47 M161 25 V47" stroke="#10141f" stroke-width="18" stroke-linecap="round"/>
      <path d="M93 45 C119 66 123 100 108 129" fill="none" stroke="#10141f" stroke-width="22" stroke-linecap="round"/>
      <path d="M109 129 C94 166 53 164 36 138" fill="none" stroke="#10141f" stroke-width="28" stroke-linecap="round"/>
      <path d="M92 45 C111 62 113 90 102 111" fill="none" stroke="#e04f42" stroke-width="8" stroke-linecap="round"/>
