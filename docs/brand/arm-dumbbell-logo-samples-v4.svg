    <text x="36" y="96" class="desc">작은 AI 노드만 얹은 팔+아령. 과하지 않은 스마트함.</text>
    <g transform="translate(62 145)">
      <rect width="188" height="188" rx="42" fill="#10141f"/>
      <rect x="47" y="29" width="94" height="14" rx="7" fill="#fffcf8"/>
      <rect x="29" y="19" width="22" height="34" rx="9" fill="#e04f42"/>
      <rect x="137" y="19" width="22" height="34" rx="9" fill="#287e72"/>
      <path d="M96 57 C120 74 124 105 108 131 C94 126 84 111 84 96 C84 78 88 65 96 57Z" fill="#fffcf8"/>
      <path d="M110 128 C99 163 56 166 36 136 C54 133 70 121 80 101 C90 109 101 119 110 128Z" fill="#fffcf8"/>
      <circle cx="53" cy="136" r="20" fill="#fffcf8"/>
      <path d="M121 110 L142 88" stroke="#e7b75f" stroke-width="9" stroke-linecap="round"/>
      <circle cx="146" cy="84" r="8" fill="#e7b75f"/>
      <circle cx="74" cy="84" r="7" fill="#287e72"/>
