    <text x="36" y="58" class="no">05</text>
    <text x="86" y="58" class="title">Circle Gym Badge</text>
    <text x="36" y="96" class="desc">헬스장 배지처럼 보이는 원형 로고.</text>
    <g transform="translate(62 145)">
      <rect width="188" height="188" rx="42" fill="#fffcf8"/>
      <circle cx="94" cy="94" r="74" fill="#10141f"/>
      <circle cx="94" cy="94" r="54" fill="#fffcf8"/>
      <path d="M61 57 H127" stroke="#10141f" stroke-width="13" stroke-linecap="round"/>
      <path d="M48 48 V66 M140 48 V66" stroke="#10141f" stroke-width="15" stroke-linecap="round"/>
      <path d="M91 66 C109 81 111 104 101 124" fill="none" stroke="#e04f42" stroke-width="18" stroke-linecap="round"/>
      <path d="M102 123 C88 148 60 146 49 128" fill="none" stroke="#287e72" stroke-width="22" stroke-linecap="round"/>
