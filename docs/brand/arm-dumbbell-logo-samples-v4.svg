    <rect width="790" height="500" rx="32" fill="#10141f" stroke="#202838" stroke-width="2"/>
    <text x="36" y="58" class="no">07</text>
    <text x="86" y="58" class="titleLight">Hardcore Silhouette</text>
    <text x="36" y="96" class="descLight">가장 헬스장다운 강한 실루엣.</text>
    <g transform="translate(62 145)">
      <rect width="188" height="188" rx="42" fill="#0b0f18"/>
      <path d="M37 35 H151" stroke="#fffcf8" stroke-width="18" stroke-linecap="round"/>
      <path d="M20 23 V49 M168 23 V49" stroke="#fffcf8" stroke-width="21" stroke-linecap="round"/>
      <path d="M93 48 C124 67 130 105 109 138" fill="none" stroke="#fffcf8" stroke-width="28" stroke-linecap="round"/>
      <path d="M108 137 C92 176 47 169 30 140" fill="none" stroke="#fffcf8" stroke-width="34" stroke-linecap="round"/>
      <path d="M108 137 C99 152 80 159 61 154" fill="none" stroke="#e04f42" stroke-width="9" stroke-linecap="round"/>
    </g>
    <text x="305" y="225" class="brandLight">Smart Trainner</text>
    <text x="305" y="275" class="descLight">남성적/강한 인상. 초보 친화 톤과는 조절 필요.</text>
  </g>

  <!-- 08 -->
