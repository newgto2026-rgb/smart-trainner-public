    <text x="36" y="58" class="no">03</text>
    <text x="86" y="58" class="titleLight">Gradient Lift</text>
    <text x="36" y="96" class="descLight">스플래시에 잘 어울리는 강한 그라데이션 버전.</text>
    <g transform="translate(62 145)">
      <rect width="188" height="188" rx="42" fill="url(#deep)"/>
      <rect x="47" y="27" width="94" height="16" rx="8" fill="#fffcf8"/>
      <rect x="29" y="18" width="22" height="34" rx="9" fill="#e7b75f"/>
      <rect x="137" y="18" width="22" height="34" rx="9" fill="#e7b75f"/>
      <rect x="82" y="42" width="26" height="20" rx="9" fill="#fffcf8"/>
      <path d="M96 57 C120 74 124 105 108 131 C94 126 84 111 84 96 C84 78 88 65 96 57Z" fill="url(#fire)"/>
      <path d="M110 128 C99 163 56 166 36 136 C54 133 70 121 80 101 C90 109 101 119 110 128Z" fill="url(#fire)"/>
