    <text x="36" y="58" class="no">09</text>
    <text x="86" y="58" class="title">Motion Arm</text>
    <text x="36" y="96" class="desc">팔이 올라가는 동작감을 더한 버전.</text>
    <g transform="translate(62 145)">
      <rect width="188" height="188" rx="42" fill="#fffcf8"/>
      <path d="M35 122 C54 96 75 77 98 52" fill="none" stroke="#e04f42" stroke-width="26" stroke-linecap="round"/>
      <path d="M99 52 C121 72 124 104 106 130" fill="none" stroke="#287e72" stroke-width="24" stroke-linecap="round"/>
      <path d="M106 130 C91 162 55 163 36 136" fill="none" stroke="#10141f" stroke-width="30" stroke-linecap="round"/>
      <path d="M50 32 H145" stroke="#10141f" stroke-width="16" stroke-linecap="round"/>
      <path d="M32 23 V49 M158 23 V49" stroke="#10141f" stroke-width="19" stroke-linecap="round"/>
      <circle cx="126" cy="46" r="7" fill="#e7b75f"/>
    </g>
    <text x="305" y="225" class="brand">Smart Trainner</text>
    <text x="305" y="275" class="desc">동적이고 젊은 느낌. 단순 아이콘보다는 캠페인/스플래시에 좋음.</text>
  </g>

  <!-- 10 -->
  <g transform="translate(940 2445)" filter="url(#shadow)">
