    <text x="36" y="96" class="desc">앱 아이콘 최적화. 굵은 형태 + 적은 디테일.</text>
    <g transform="translate(62 145)">
      <rect width="188" height="188" rx="42" fill="url(#deep)"/>
      <rect x="47" y="29" width="94" height="16" rx="8" fill="#e7b75f"/>
      <rect x="29" y="18" width="22" height="36" rx="9" fill="#e7b75f"/>
      <rect x="137" y="18" width="22" height="36" rx="9" fill="#e7b75f"/>
      <path d="M96 57 C119 75 122 104 106 129 C93 125 84 111 84 96 C84 78 88 65 96 57Z" fill="#fffcf8"/>
      <path d="M108 126 C98 160 58 164 37 136 C56 133 72 121 80 101 C89 109 99 118 108 126Z" fill="#fffcf8"/>
      <circle cx="54" cy="135" r="18" fill="#fffcf8"/>
      <path d="M129 121 H151" stroke="#287e72" stroke-width="13" stroke-linecap="round"/>
      <circle cx="156" cy="121" r="9" fill="#287e72"/>
    </g>
    <text x="305" y="225" class="brand">Smart Trainner</text>
    <text x="305" y="275" class="desc">내 추천. 세련되고 강하면서 앱 아이콘으로 안정적.</text>
  </g>

  <!-- 09 -->
