      <path d="M46 38 H142" stroke="#fffcf8" stroke-width="16" stroke-linecap="round"/>
      <path d="M29 28 V50 M159 28 V50" stroke="#fffcf8" stroke-width="18" stroke-linecap="round"/>
      <path d="M94 54 C120 74 124 104 108 130" fill="none" stroke="#e04f42" stroke-width="22" stroke-linecap="round"/>
      <path d="M109 130 C94 164 56 165 36 137" fill="none" stroke="#e04f42" stroke-width="28" stroke-linecap="round"/>
      <text x="61" y="148" font-family="Arial, sans-serif" font-size="58" font-weight="900" fill="#fffcf8">ST</text>
      <rect x="118" y="103" width="25" height="10" rx="5" fill="#287e72"/>
      <circle cx="148" cy="108" r="8" fill="#e7b75f"/>
    </g>
    <text x="305" y="225" class="brand">Smart Trainner</text>
    <text x="305" y="275" class="desc">브랜드명 기억에는 좋지만 아이콘 안 정보가 약간 많음.</text>
