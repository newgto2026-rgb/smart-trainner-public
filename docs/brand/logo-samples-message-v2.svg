<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="3600" viewBox="0 0 1800 3600">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffcf7"/>
      <stop offset="0.45" stop-color="#f2fbf6"/>
      <stop offset="1" stop-color="#eef6fb"/>
    </linearGradient>
    <linearGradient id="cardWarm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.52" stop-color="#f1faf5"/>
      <stop offset="1" stop-color="#fff0e7"/>
    </linearGradient>
    <linearGradient id="deep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#123540"/>
      <stop offset="0.52" stop-color="#15233c"/>
      <stop offset="1" stop-color="#35283a"/>
    </linearGradient>
    <linearGradient id="energy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e04f42"/>
      <stop offset="0.55" stop-color="#287e72"/>
      <stop offset="1" stop-color="#e7b75f"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#10141f" flood-opacity="0.12"/>
    </filter>
    <style>
      .pageTitle { font: 900 54px "Apple SD Gothic Neo", "Noto Sans CJK KR", Arial, sans-serif; fill: #10141f; }
      .pageSub { font: 600 25px "Apple SD Gothic Neo", "Noto Sans CJK KR", Arial, sans-serif; fill: #687180; }
      .num { font: 900 24px Arial, sans-serif; fill: #e04f42; }
      .title { font: 900 34px "Apple SD Gothic Neo", "Noto Sans CJK KR", Arial, sans-serif; fill: #10141f; }
      .message { font: 900 30px "Apple SD Gothic Neo", "Noto Sans CJK KR", Arial, sans-serif; fill: #10141f; }
      .desc { font: 600 20px "Apple SD Gothic Neo", "Noto Sans CJK KR", Arial, sans-serif; fill: #687180; }
      .small { font: 700 17px "Apple SD Gothic Neo", "Noto Sans CJK KR", Arial, sans-serif; fill: #687180; }
      .word { font: 900 39px "Apple SD Gothic Neo", "Noto Sans CJK KR", Arial, sans-serif; fill: #10141f; }
      .wordLight { font: 900 39px "Apple SD Gothic Neo", "Noto Sans CJK KR", Arial, sans-serif; fill: #fffcf8; }
    </style>
  </defs>

  <rect width="1800" height="3600" fill="url(#pageBg)"/>
  <text x="70" y="90" class="pageTitle">Smart Trainner 로고 2차 시안</text>
  <text x="70" y="134" class="pageSub">이번 보드는 “무슨 앱인지”가 바로 보이도록 플랜, 기록, 성장, AI 코치 메시지를 크게 드러냈습니다.</text>

  <!-- 01 -->
  <g transform="translate(70 190)" filter="url(#softShadow)">
    <rect width="790" height="500" rx="30" fill="url(#cardWarm)" stroke="#e1dad0" stroke-width="2"/>
    <text x="34" y="56" class="num">01</text>
    <text x="78" y="56" class="title">주간 플랜 바벨</text>
    <text x="34" y="100" class="desc">캘린더 + 덤벨로 “헬스장 가면 뭘 할지 짜준다”를 직접 표현.</text>
    <g transform="translate(54 155)">
      <rect width="170" height="170" rx="34" fill="#10141f"/>
      <rect x="42" y="42" width="86" height="80" rx="16" fill="#fffcf8"/>
      <rect x="42" y="42" width="86" height="22" rx="10" fill="#e04f42"/>
      <circle cx="61" cy="82" r="7" fill="#287e72"/>
      <circle cx="85" cy="82" r="7" fill="#e7b75f"/>
      <circle cx="109" cy="82" r="7" fill="#287e72"/>
      <rect x="30" y="130" width="110" height="14" rx="7" fill="#fffcf8"/>
      <rect x="17" y="119" width="18" height="36" rx="9" fill="#e04f42"/>
      <rect x="135" y="119" width="18" height="36" rx="9" fill="#287e72"/>
    </g>
    <text x="270" y="206" class="message">메시지: 주간 운동 플랜</text>
    <text x="270" y="258" class="word">Smart Trainner</text>
    <text x="270" y="306" class="small">가장 MVP 설명력이 좋음. 첫 사용자에게 기능이 바로 읽힘.</text>
    <rect x="270" y="342" width="96" height="16" rx="8" fill="#e04f42"/>
    <rect x="382" y="342" width="96" height="16" rx="8" fill="#287e72"/>
    <rect x="494" y="342" width="96" height="16" rx="8" fill="#e7b75f"/>
  </g>

  <!-- 02 -->
  <g transform="translate(940 190)" filter="url(#softShadow)">
    <rect width="790" height="500" rx="30" fill="#ffffff" stroke="#e1dad0" stroke-width="2"/>
    <text x="34" y="56" class="num">02</text>
    <text x="78" y="56" class="title">세트 기록 노트</text>
    <text x="34" y="100" class="desc">세트별 무게/횟수를 기록하는 앱이라는 메시지.</text>
    <g transform="translate(54 155)">
      <rect width="170" height="170" rx="34" fill="#fffcf8" stroke="#10141f" stroke-width="10"/>
      <rect x="45" y="36" width="80" height="18" rx="9" fill="#e04f42"/>
      <rect x="45" y="72" width="80" height="18" rx="9" fill="#287e72"/>
      <rect x="45" y="108" width="80" height="18" rx="9" fill="#e7b75f"/>
      <circle cx="33" cy="45" r="8" fill="#10141f"/>
      <circle cx="33" cy="81" r="8" fill="#10141f"/>
      <circle cx="33" cy="117" r="8" fill="#10141f"/>
      <path d="M118 122 L148 92" stroke="#10141f" stroke-width="12" stroke-linecap="round"/>
      <path d="M145 89 L156 100 L135 111 Z" fill="#e04f42"/>
    </g>
    <text x="270" y="206" class="message">메시지: 실제 운동 기록</text>
    <text x="270" y="258" class="word">Smart Trainner</text>
    <text x="270" y="306" class="small">기록 탭 제거 후 플랜에서 바로 기록하는 현재 UX와 잘 맞음.</text>
    <rect x="270" y="342" width="96" height="16" rx="8" fill="#10141f"/>
    <rect x="382" y="342" width="96" height="16" rx="8" fill="#e04f42"/>
    <rect x="494" y="342" width="96" height="16" rx="8" fill="#287e72"/>
  </g>

  <!-- 03 -->
  <g transform="translate(70 750)" filter="url(#softShadow)">
    <rect width="790" height="500" rx="30" fill="#ffffff" stroke="#e1dad0" stroke-width="2"/>
    <text x="34" y="56" class="num">03</text>
    <text x="78" y="56" class="title">성장 플레이트</text>
    <text x="34" y="100" class="desc">원판 + 상승 그래프로 발전 분석을 강조.</text>
    <g transform="translate(54 155)">
      <rect width="170" height="170" rx="34" fill="#10141f"/>
      <circle cx="85" cy="85" r="58" fill="none" stroke="#fffcf8" stroke-width="18"/>
      <circle cx="85" cy="85" r="20" fill="#202838" stroke="#fffcf8" stroke-width="8"/>
      <rect x="56" y="108" width="17" height="30" rx="8" fill="#e04f42"/>
      <rect x="79" y="90" width="17" height="48" rx="8" fill="#287e72"/>
      <rect x="102" y="65" width="17" height="73" rx="8" fill="#e7b75f"/>
      <path d="M54 82 L82 68 L112 46" fill="none" stroke="#e04f42" stroke-width="8" stroke-linecap="round"/>
    </g>
    <text x="270" y="206" class="message">메시지: 성장 분석</text>
    <text x="270" y="258" class="word">Smart Trainner</text>
    <text x="270" y="306" class="small">To-be인 AI 분석/성장 확인까지 자연스럽게 확장 가능.</text>
    <rect x="270" y="342" width="96" height="16" rx="8" fill="#10141f"/>
    <rect x="382" y="342" width="96" height="16" rx="8" fill="#287e72"/>
    <rect x="494" y="342" width="96" height="16" rx="8" fill="#e7b75f"/>
  </g>

  <!-- 04 -->
  <g transform="translate(940 750)" filter="url(#softShadow)">
    <rect width="790" height="500" rx="30" fill="#10141f" stroke="#202838" stroke-width="2"/>
    <text x="34" y="56" class="num">04</text>
    <text x="78" y="56" class="title" fill="#fffcf8">AI 코치 스팟터</text>
    <text x="34" y="100" class="desc" fill="#d5dce2">코치 얼굴 + 회로 + 바벨. 너무 AI스럽지 않게.</text>
    <g transform="translate(54 155)">
      <rect width="170" height="170" rx="34" fill="url(#deep)"/>
      <circle cx="84" cy="70" r="31" fill="#fffcf8"/>
      <path d="M42 138 C51 108 119 108 128 138" fill="none" stroke="#fffcf8" stroke-width="18" stroke-linecap="round"/>
      <path d="M39 92 H131" stroke="#287e72" stroke-width="12" stroke-linecap="round"/>
      <circle cx="39" cy="92" r="11" fill="#e04f42"/>
      <circle cx="131" cy="92" r="11" fill="#287e72"/>
      <circle cx="85" cy="36" r="9" fill="#e7b75f"/>
      <path d="M85 36 V54" stroke="#e7b75f" stroke-width="6" stroke-linecap="round"/>
    </g>
    <text x="270" y="206" class="message" fill="#fffcf8">메시지: AI 코치</text>
    <text x="270" y="258" class="wordLight">Smart Trainner</text>
    <text x="270" y="306" class="small" fill="#d5dce2">장기 로드맵까지 강함. 현재 MVP에서는 약간 미래지향적.</text>
    <rect x="270" y="342" width="210" height="16" rx="8" fill="url(#energy)"/>
  </g>

  <!-- 05 -->
  <g transform="translate(70 1310)" filter="url(#softShadow)">
    <rect width="790" height="500" rx="30" fill="url(#cardWarm)" stroke="#e1dad0" stroke-width="2"/>
    <text x="34" y="56" class="num">05</text>
    <text x="78" y="56" class="title">루틴 경로 지도</text>
    <text x="34" y="100" class="desc">오늘부터 이번 주까지 따라갈 경로를 보여주는 느낌.</text>
    <g transform="translate(54 155)">
      <rect width="170" height="170" rx="34" fill="#fffcf8"/>
      <path d="M38 126 C64 86 58 42 93 50 C133 59 104 112 136 38" fill="none" stroke="#10141f" stroke-width="12" stroke-linecap="round"/>
      <circle cx="38" cy="126" r="16" fill="#e04f42"/>
      <circle cx="93" cy="50" r="16" fill="#287e72"/>
      <circle cx="136" cy="38" r="16" fill="#e7b75f"/>
      <path d="M50 126 L74 126" stroke="#fffcf8" stroke-width="8" stroke-linecap="round"/>
      <path d="M93 38 V62" stroke="#fffcf8" stroke-width="8" stroke-linecap="round"/>
      <path d="M124 38 H148" stroke="#10141f" stroke-width="8" stroke-linecap="round"/>
    </g>
    <text x="270" y="206" class="message">메시지: 오늘 할 일 안내</text>
    <text x="270" y="258" class="word">Smart Trainner</text>
    <text x="270" y="306" class="small">“뭐 해야 하지?”라는 MVP 핵심 질문에 잘 대응.</text>
    <rect x="270" y="342" width="96" height="16" rx="8" fill="#e04f42"/>
    <rect x="382" y="342" width="96" height="16" rx="8" fill="#10141f"/>
    <rect x="494" y="342" width="96" height="16" rx="8" fill="#287e72"/>
  </g>

  <!-- 06 -->
  <g transform="translate(940 1310)" filter="url(#softShadow)">
    <rect width="790" height="500" rx="30" fill="#ffffff" stroke="#e1dad0" stroke-width="2"/>
    <text x="34" y="56" class="num">06</text>
    <text x="78" y="56" class="title">운동 방법 프레임</text>
    <text x="34" y="100" class="desc">단계 이미지/자세 설명 기능을 더 명확히.</text>
    <g transform="translate(54 155)">
      <rect width="170" height="170" rx="34" fill="#10141f"/>
      <rect x="32" y="30" width="106" height="110" rx="18" fill="#fffcf8"/>
      <circle cx="85" cy="58" r="18" fill="#287e72"/>
      <path d="M58 116 C66 82 104 82 112 116" fill="none" stroke="#e04f42" stroke-width="12" stroke-linecap="round"/>
      <path d="M52 38 H36 V60" fill="none" stroke="#e7b75f" stroke-width="8" stroke-linecap="round"/>
      <path d="M118 132 H140 V110" fill="none" stroke="#e7b75f" stroke-width="8" stroke-linecap="round"/>
    </g>
    <text x="270" y="206" class="message">메시지: 운동 방법 보기</text>
    <text x="270" y="258" class="word">Smart Trainner</text>
    <text x="270" y="306" class="small">이미지와 설명이 앱의 강점이라면 이쪽이 선명함.</text>
    <rect x="270" y="342" width="96" height="16" rx="8" fill="#10141f"/>
    <rect x="382" y="342" width="96" height="16" rx="8" fill="#e7b75f"/>
    <rect x="494" y="342" width="96" height="16" rx="8" fill="#e04f42"/>
  </g>

  <!-- 07 -->
  <g transform="translate(70 1870)" filter="url(#softShadow)">
    <rect width="790" height="500" rx="30" fill="#ffffff" stroke="#e1dad0" stroke-width="2"/>
    <text x="34" y="56" class="num">07</text>
    <text x="78" y="56" class="title">헬스장 체크인</text>
    <text x="34" y="100" class="desc">헬스장에 갔을 때 바로 쓸 앱이라는 사용 상황을 강조.</text>
    <g transform="translate(54 155)">
      <rect width="170" height="170" rx="34" fill="url(#cardWarm)"/>
      <path d="M47 132 V58 C47 44 58 34 72 34 H118" fill="none" stroke="#10141f" stroke-width="12" stroke-linecap="round"/>
      <rect x="82" y="54" width="52" height="78" rx="12" fill="#287e72"/>
      <path d="M61 88 L78 105 L116 66" fill="none" stroke="#e04f42" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="104" y="86" width="10" height="10" rx="5" fill="#fffcf8"/>
      <rect x="32" y="132" width="110" height="10" rx="5" fill="#e7b75f"/>
    </g>
    <text x="270" y="206" class="message">메시지: 헬스장 동행</text>
    <text x="270" y="258" class="word">Smart Trainner</text>
    <text x="270" y="306" class="small">사용 맥락은 좋지만, 브랜드 확장성은 조금 좁을 수 있음.</text>
    <rect x="270" y="342" width="96" height="16" rx="8" fill="#287e72"/>
    <rect x="382" y="342" width="96" height="16" rx="8" fill="#e04f42"/>
    <rect x="494" y="342" width="96" height="16" rx="8" fill="#e7b75f"/>
  </g>

  <!-- 08 -->
  <g transform="translate(940 1870)" filter="url(#softShadow)">
    <rect width="790" height="500" rx="30" fill="#fffcf8" stroke="#e1dad0" stroke-width="2"/>
    <text x="34" y="56" class="num">08</text>
    <text x="78" y="56" class="title">균형 분할 루틴</text>
    <text x="34" y="100" class="desc">전신/하체/등/가슴 등 균형 잡힌 주간 계획.</text>
    <g transform="translate(54 155)">
      <rect width="170" height="170" rx="34" fill="#10141f"/>
      <circle cx="85" cy="85" r="58" fill="#fffcf8"/>
      <path d="M85 27 A58 58 0 0 1 143 85 L85 85 Z" fill="#e04f42"/>
      <path d="M143 85 A58 58 0 0 1 85 143 L85 85 Z" fill="#287e72"/>
      <path d="M85 143 A58 58 0 0 1 27 85 L85 85 Z" fill="#e7b75f"/>
      <circle cx="85" cy="85" r="22" fill="#10141f"/>
      <rect x="59" y="79" width="52" height="12" rx="6" fill="#fffcf8"/>
    </g>
    <text x="270" y="206" class="message">메시지: 균형 있는 플랜</text>
    <text x="270" y="258" class="word">Smart Trainner</text>
    <text x="270" y="306" class="small">분석/부위 밸런스 탭과 연결감이 좋음.</text>
    <rect x="270" y="342" width="96" height="16" rx="8" fill="#e04f42"/>
    <rect x="382" y="342" width="96" height="16" rx="8" fill="#287e72"/>
    <rect x="494" y="342" width="96" height="16" rx="8" fill="#10141f"/>
  </g>

  <!-- 09 -->
  <g transform="translate(70 2430)" filter="url(#softShadow)">
    <rect width="790" height="500" rx="30" fill="#10141f" stroke="#202838" stroke-width="2"/>
    <text x="34" y="56" class="num">09</text>
    <text x="78" y="56" class="title" fill="#fffcf8">PR 상승 화살표</text>
    <text x="34" y="100" class="desc" fill="#d5dce2">운동 기록이 성장으로 이어지는 메시지.</text>
    <g transform="translate(54 155)">
      <rect width="170" height="170" rx="34" fill="url(#deep)"/>
      <rect x="34" y="112" width="32" height="24" rx="8" fill="#e04f42"/>
      <rect x="70" y="90" width="32" height="46" rx="8" fill="#287e72"/>
      <rect x="106" y="60" width="32" height="76" rx="8" fill="#e7b75f"/>
      <path d="M44 78 L82 62 L120 34" fill="none" stroke="#fffcf8" stroke-width="12" stroke-linecap="round"/>
      <path d="M120 34 L119 59 M120 34 L95 36" fill="none" stroke="#fffcf8" stroke-width="12" stroke-linecap="round"/>
      <rect x="42" y="140" width="88" height="10" rx="5" fill="#d5dce2"/>
    </g>
    <text x="270" y="206" class="message" fill="#fffcf8">메시지: 기록 → 발전</text>
    <text x="270" y="258" class="wordLight">Smart Trainner</text>
    <text x="270" y="306" class="small" fill="#d5dce2">운동 분석 니즈가 강하면 가장 직관적인 방향.</text>
    <rect x="270" y="342" width="210" height="16" rx="8" fill="url(#energy)"/>
  </g>

  <!-- 10 -->
  <g transform="translate(940 2430)" filter="url(#softShadow)">
    <rect width="790" height="500" rx="30" fill="url(#cardWarm)" stroke="#e1dad0" stroke-width="2"/>
    <text x="34" y="56" class="num">10</text>
    <text x="78" y="56" class="title">트레이닝 카드</text>
    <text x="34" y="100" class="desc">오늘의 운동 카드와 루틴 선택 UI를 브랜드화.</text>
    <g transform="translate(54 155)">
      <rect width="170" height="170" rx="34" fill="#10141f"/>
      <rect x="38" y="34" width="94" height="102" rx="18" fill="#fffcf8"/>
      <rect x="50" y="50" width="70" height="12" rx="6" fill="#e04f42"/>
      <rect x="50" y="76" width="70" height="12" rx="6" fill="#287e72"/>
      <rect x="50" y="102" width="42" height="12" rx="6" fill="#e7b75f"/>
      <path d="M98 124 L126 98" stroke="#10141f" stroke-width="10" stroke-linecap="round"/>
      <circle cx="128" cy="96" r="11" fill="#287e72"/>
    </g>
    <text x="270" y="206" class="message">메시지: 운동 카드 추천</text>
    <text x="270" y="258" class="word">Smart Trainner</text>
    <text x="270" y="306" class="small">UI와 브랜드가 잘 맞지만, 헬스 앱 느낌은 약간 덜함.</text>
    <rect x="270" y="342" width="96" height="16" rx="8" fill="#10141f"/>
    <rect x="382" y="342" width="96" height="16" rx="8" fill="#e04f42"/>
    <rect x="494" y="342" width="96" height="16" rx="8" fill="#e7b75f"/>
  </g>

  <!-- 11 -->
  <g transform="translate(70 2990)" filter="url(#softShadow)">
    <rect width="790" height="500" rx="30" fill="#ffffff" stroke="#e1dad0" stroke-width="2"/>
    <text x="34" y="56" class="num">11</text>
    <text x="78" y="56" class="title">스마트 덤벨 S</text>
    <text x="34" y="100" class="desc">앱 이름의 Smart와 운동 장비를 가장 단순하게 결합.</text>
    <g transform="translate(54 155)">
      <rect width="170" height="170" rx="34" fill="#10141f"/>
      <path d="M116 45 C78 28 48 44 48 70 C48 104 116 85 116 118 C116 142 74 142 48 126" fill="none" stroke="#fffcf8" stroke-width="17" stroke-linecap="round"/>
      <path d="M38 86 H132" stroke="#287e72" stroke-width="12" stroke-linecap="round"/>
      <rect x="28" y="72" width="18" height="28" rx="9" fill="#e04f42"/>
      <rect x="124" y="72" width="18" height="28" rx="9" fill="#e7b75f"/>
    </g>
    <text x="270" y="206" class="message">메시지: 스마트한 운동</text>
    <text x="270" y="258" class="word">Smart Trainner</text>
    <text x="270" y="306" class="small">앱 이름 기억에는 좋지만, 플랜/기록 메시지는 보조 설명 필요.</text>
    <rect x="270" y="342" width="96" height="16" rx="8" fill="#10141f"/>
    <rect x="382" y="342" width="96" height="16" rx="8" fill="#287e72"/>
    <rect x="494" y="342" width="96" height="16" rx="8" fill="#e7b75f"/>
  </g>

  <!-- 12 -->
  <g transform="translate(940 2990)" filter="url(#softShadow)">
    <rect width="790" height="500" rx="30" fill="#ffffff" stroke="#e1dad0" stroke-width="2"/>
