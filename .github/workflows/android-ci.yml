name: Android CI

on:
  pull_request:
    branches:
      - "**"

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test-lint:
    name: Build, Unit Test, Lint
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run Android unit tests
        run: ./gradlew --stacktrace testDebugUnitTest

      - name: Run JVM unit tests
        run: ./gradlew --stacktrace test -Psmarttrainner.serverBaseUrl=https://ci.smart-trainner.invalid/

      - name: Build debug APK
        run: ./gradlew --stacktrace :app:assembleDebug

      - name: Build debug androidTest APK
        run: ./gradlew --stacktrace :app:assembleDebugAndroidTest

      - name: Run strict lint
        run: ./gradlew --stacktrace lint

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: |
            **/build/test-results/**
            **/build/reports/tests/**
          if-no-files-found: warn

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-reports
          path: |
            **/build/reports/lint-results*.html
            **/build/reports/lint-results*.xml
            **/build/reports/lint-results*.sarif
          if-no-files-found: warn

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-reports
          path: |
            **/build/outputs/logs/**
            **/build/reports/**
          if-no-files-found: warn
