name: Android Instrumented Tests

on:
  pull_request:
    branches:
      - "**"
    paths:
      - "app/src/androidTest/**"
      - "feature/**/src/androidTest/**"
      - "app/src/main/**"
      - "feature/**/src/main/**"
      - "core/**/src/main/**"
      - "gradle/**"
      - "*.gradle.kts"
      - "settings.gradle.kts"

concurrency:
  group: android-instrumented-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  connected-tests:
    name: Connected UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run connected debug Android tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_2
          emulator-boot-timeout: 1200
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -no-metrics
          disable-animations: true
          script: ./gradlew --stacktrace :app:connectedDebugAndroidTest

      - name: Upload androidTest reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-instrumented-reports
          path: |
            **/build/reports/androidTests/**
            **/build/outputs/androidTest-results/**
          if-no-files-found: warn
